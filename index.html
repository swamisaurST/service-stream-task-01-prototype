<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Stream — Out-of-scope assets (prototype)</title>
    <meta
      name="description"
      content="Interactive prototype: view out-of-scope assets on the field map. Screens match Task-01.pen at 396×874."
    />
    <link
      rel="canonical"
      href="https://swamisaurst.github.io/service-stream-task-01-prototype/"
    />
    <meta name="theme-color" content="#0b827c" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Prototype navigation">
        <header class="sidebar-header">
          <p class="eyebrow">Service Stream</p>
          <h1>View out-of-scope assets</h1>
          <p id="state-hint" class="state-hint" aria-live="polite"></p>
        </header>

        <nav class="flow-nav" aria-label="Prototype screens">
          <div class="flow-nav__group flow-nav__group--happy">
            <span class="flow-nav__group-label">
              <svg class="flow-nav__group-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
              Happy path
            </span>
            <div class="flow-nav__pills" id="flow-pills--happy"></div>
          </div>
          <div class="flow-nav__group flow-nav__group--edge">
            <span class="flow-nav__group-label">
              <svg class="flow-nav__group-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
              Edge cases
            </span>
            <div class="flow-nav__pills" id="flow-pills--edge"></div>
          </div>
          <div class="flow-nav__group flow-nav__group--subflow">
            <span class="flow-nav__group-label">
              <svg class="flow-nav__group-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
              </svg>
              Add to project
            </span>
            <div class="flow-nav__pills" id="flow-pills--subflow"></div>
          </div>
          <div class="flow-nav__group flow-nav__group--ref">
            <span class="flow-nav__group-label">
              <svg class="flow-nav__group-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
              </svg>
              Reference
            </span>
            <div class="flow-nav__pills" id="flow-pills--ref"></div>
          </div>
        </nav>
      </aside>

      <div class="stage-column">
        <div class="stage-body">
          <main class="stage" id="prototype-stage">
            <div class="device-frame">
              <div class="device-screen" id="device-screen">
                <img
                  id="screen-image"
                  class="screen-image"
                  width="396"
                  height="874"
                  alt=""
                />
                <div id="hits-layer" class="hits-layer"></div>
              </div>
            </div>
          </main>
        </div>
        <aside class="stage-rail" aria-label="Preview display">
          <button
            type="button"
            class="scale-toggle"
            id="scale-toggle"
            aria-pressed="false"
            title="Scale preview to fit the window"
          >
            <span class="scale-toggle__glyph" aria-hidden="true">
              <svg class="scale-toggle__icon scale-toggle__icon--fit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 3 21 3 21 9" />
                <polyline points="9 21 3 21 3 15" />
                <line x1="21" y1="3" x2="14" y2="10" />
                <line x1="3" y1="21" x2="10" y2="14" />
              </svg>
              <svg class="scale-toggle__icon scale-toggle__icon--actual" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                <line x1="12" y1="18" x2="12.01" y2="18" />
              </svg>
            </span>
            <span class="scale-toggle__label">Fit</span>
          </button>
        </aside>
      </div>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>

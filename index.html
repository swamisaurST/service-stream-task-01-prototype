<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Stream — Out-of-scope assets (prototype)</title>
    <meta
      name="description"
      content="Interactive prototype: view out-of-scope assets on the field map. Screens match Task-01.pen at 396×874."
    />
    <link
      rel="canonical"
      href="https://swamisaurst.github.io/service-stream-task-01-prototype/"
    />
    <meta name="theme-color" content="#09090b" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css?v=20260413a" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Prototype navigation">
        <div class="sidebar-brand">
          <img
            class="sidebar-brand__logo"
            src="./assets/sitetracker-logo-white.png"
            alt="Sitetracker"
            width="200"
            height="40"
          />
          <p class="prototype-disclaimer" role="note">
            This prototype is for representative purposes only and does not reflect
            an actual product release.
          </p>
        </div>
        <header class="sidebar-header">
          <p class="eyebrow">Service Stream</p>
          <h1>View out-of-scope assets</h1>
          <p id="state-hint" class="state-hint" aria-live="polite"></p>
        </header>

        <nav class="flow-nav" aria-label="Prototype screens">
          <div class="flow-nav__group flow-nav__group--ref">
            <span class="flow-nav__group-label">
              <svg
                class="flow-nav__group-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
              </svg>
              Reference
            </span>
            <div class="flow-nav__pills" id="flow-pills--ref"></div>
          </div>
          <div class="flow-nav__group flow-nav__group--happy">
            <span class="flow-nav__group-label">
              <svg
                class="flow-nav__group-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="9" />
                <path d="M8 12l2.5 2.5L16 9" />
              </svg>
              Happy path
            </span>
            <div class="flow-nav__pills" id="flow-pills--happy"></div>
          </div>
          <div class="flow-nav__group flow-nav__group--edge">
            <span class="flow-nav__group-label">
              <svg
                class="flow-nav__group-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M12 5 L4 19 L20 19 Z" />
                <line x1="12" y1="10" x2="12" y2="14" />
                <circle cx="12" cy="17" r="1.25" fill="currentColor" stroke="none" />
              </svg>
              Edge cases
            </span>
            <div class="flow-nav__pills" id="flow-pills--edge"></div>
          </div>
          <div class="flow-nav__group flow-nav__group--subflow">
            <span class="flow-nav__group-label">
              <svg
                class="flow-nav__group-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M8 3h8l1 2h5v15H4V5h4l1-2z" />
                <line x1="8" y1="10" x2="16" y2="10" />
                <line x1="8" y1="14" x2="14" y2="14" />
              </svg>
              Add to project
            </span>
            <div class="flow-nav__pills" id="flow-pills--subflow"></div>
          </div>
        </nav>
      </aside>

      <div class="stage-column">
        <div class="stage-body">
          <main class="stage" id="prototype-stage">
            <div class="device-frame">
              <div class="device-screen" id="device-screen">
                <img
                  id="screen-image"
                  class="screen-image"
                  width="396"
                  height="874"
                  alt=""
                />
                <div id="hits-layer" class="hits-layer"></div>
              </div>
            </div>
          </main>
        </div>
        <aside class="stage-rail" aria-label="Preview display">
          <button
            type="button"
            class="scale-toggle"
            id="scale-toggle"
            aria-pressed="false"
            title="Scale preview to fit the window"
          >
            <span class="scale-toggle__label">Fit</span>
          </button>
        </aside>
      </div>
    </div>

    <script src="./js/app.js?v=20260413a"></script>
  </body>
</html>
